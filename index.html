<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Character Sheet 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Spectral:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --bg: #0d0d0f; --card: #1a1a1f; --border: #2d2d33; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Spectral', serif; }
        h1, h2, h3, .font-fantasy { font-family: 'Marcellus', serif; color: var(--gold); }
        .glass-card { background: var(--card); border: 1px solid var(--border); border-top: 2px solid var(--gold); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        input, textarea, select { background: #111115 !important; border: 1px solid #333 !important; color: white !important; padding: 8px; border-radius: 6px; outline: none; }
        input:focus { border-color: var(--gold) !important; }
        .stat-box { background: linear-gradient(145deg, #222228, #16161a); border: 1px solid var(--border); text-align: center; border-radius: 10px; padding: 8px; }
        .slot-circle { width: 12px; height: 12px; border: 2px solid var(--gold); border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .slot-circle.filled { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
        .btn-gold { background: linear-gradient(to bottom, #c5a059, #9c7a3c); color: black; font-weight: bold; padding: 8px 16px; border-radius: 6px; cursor: pointer; border: none; }
        .item-desc { font-size: 0.85rem; color: #aaa; border-left: 2px solid var(--gold); padding: 8px; margin-top: 5px; background: rgba(0,0,0,0.2); }
        .hidden-content { display: none; }
        .show { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .del-btn { color: #444; transition: 0.2s; cursor: pointer; padding: 0 5px; }
        .del-btn:hover { color: #ef4444; }
    </style>
</head>
<body class="p-4 lg:p-10">

    <header class="max-w-[1400px] mx-auto mb-10 flex flex-wrap justify-between items-center gap-6 glass-card p-6">
        <div class="flex items-center gap-6">
            <div class="h-16 w-16 bg-gold/10 rounded-full flex items-center justify-center border border-gold/30">
                <i class="fa-solid fa-dragon text-3xl text-gold"></i>
            </div>
            <div>
                <select id="char-select" onchange="window.switchChar()" class="text-2xl font-bold bg-transparent border-none text-gold cursor-pointer w-auto outline-none"></select>
                <div class="flex gap-4 mt-1">
                    <button onclick="window.newChar()" class="text-[10px] uppercase tracking-widest text-gray-500 hover:text-white">+ Новий герой</button>
                    <button onclick="window.deleteChar()" class="text-[10px] uppercase tracking-widest text-red-800 hover:text-red-500">Видалити герою</button>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-6 bg-black/40 p-4 rounded-xl border border-white/5">
            <div class="flex flex-col">
                <label class="text-[10px] uppercase tracking-widest text-gray-500 mb-1 text-center">Cloud ID</label>
                <input type="text" id="sync-id" class="text-sm w-40 text-center" placeholder="Gimli_2026">
            </div>
            <div class="flex gap-3">
                <button onclick="window.syncToCloud()" class="p-3 bg-blue-900/10 text-blue-400 rounded-lg border border-blue-900/30 hover:bg-blue-900/30 font-bold text-xs">ЗБЕРЕГТИ</button>
                <button onclick="window.syncFromCloud()" class="p-3 bg-green-900/10 text-green-400 rounded-lg border border-green-900/30 hover:bg-green-900/30 font-bold text-xs">ЗАВАНТАЖИТИ</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <div class="space-y-6">
            <div class="glass-card p-6 space-y-3">
                <input type="text" id="name" oninput="window.upd('name')" class="text-2xl font-bold w-full bg-transparent border-none p-0" placeholder="Ім'я">
                <div class="flex gap-2">
                    <input type="text" id="race" oninput="window.upd('race')" class="w-1/2 text-xs text-gold/80" placeholder="Раса">
                    <input type="text" id="class" oninput="window.upd('class')" class="w-1/2 text-xs text-gold/80" placeholder="Клас та Рівень">
                </div>
                <div class="pt-2 flex justify-between items-center text-xs">
                    <span class="text-gray-500 uppercase font-bold">Бонус майстерності</span>
                    <input type="number" id="prof" oninput="window.upd('prof')" class="w-12 text-center text-gold font-bold bg-transparent border-none p-0">
                </div>
            </div>

            <div id="stats" class="grid grid-cols-2 gap-4"></div>

            <div class="glass-card p-6">
                <h3 class="text-xs font-bold uppercase mb-4 tracking-widest border-b border-gold/20 pb-2 text-center">Навички</h3>
                <div id="skills" class="space-y-1.5 text-[11px]"></div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="grid grid-cols-3 gap-4">
                <div class="stat-box"><p class="text-[9px] text-gray-500 font-bold uppercase">КД</p><input type="number" id="ac" oninput="window.upd('ac')" class="text-2xl font-fantasy w-full text-center bg-transparent border-none p-0"></div>
                <div class="stat-box"><p class="text-[9px] text-gray-500 font-bold uppercase">Ініц</p><input type="number" id="init" oninput="window.upd('init')" class="text-2xl font-fantasy w-full text-center bg-transparent border-none p-0"></div>
                <div class="stat-box"><p class="text-[9px] text-gray-500 font-bold uppercase">Швид</p><input type="text" id="spd" oninput="window.upd('spd')" class="text-xl font-fantasy w-full text-center bg-transparent border-none p-0"></div>
            </div>

            <div class="glass-card p-6 border-t-green-700">
                <div class="flex justify-between items-end mb-4">
                    <h3 class="text-xs font-bold uppercase">Здоров'я</h3>
                    <div class="text-2xl font-fantasy text-green-500"><span id="cur-hp">0</span> / <input type="number" id="max-hp" oninput="window.upd('max-hp')" class="w-16 bg-transparent text-center border-none p-0"></div>
                </div>
                <div class="h-3 bg-black rounded-full overflow-hidden mb-4"><div id="hp-bar" class="h-full bg-green-600 transition-all duration-500"></div></div>
                <div class="flex gap-2">
                    <input type="number" id="hp-amt" placeholder="Сума" class="w-full text-center">
                    <button onclick="window.modHP(-1)" class="w-12 bg-red-900/20 text-red-500 rounded font-bold border border-red-900/30">-</button>
                    <button onclick="window.modHP(1)" class="w-12 bg-green-900/20 text-green-500 rounded font-bold border border-green-900/30">+</button>
                </div>
            </div>

            <div class="glass-card p-6">
                <h3 class="text-xs font-bold uppercase mb-4 text-center tracking-widest">Магічні комірки</h3>
                <div id="slots" class="space-y-3"></div>
                <button onclick="window.longRest()" class="mt-6 w-full text-[10px] uppercase font-bold text-gold border border-gold/30 py-2 rounded hover:bg-gold/10">Довгий відпочинок</button>
            </div>
        </div>

        <div class="space-y-6">
            <div class="glass-card p-6 border-t-red-900">
                <h3 class="text-xs font-bold mb-4 uppercase flex justify-between">Арсенал <i class="fa-solid fa-shield-halved"></i></h3>
                <div id="weapon-list" class="space-y-2 mb-4"></div>
                <div class="space-y-2 bg-black/20 p-3 rounded">
                    <input type="text" id="wp-n" placeholder="Назва зброї" class="text-xs w-full">
                    <input type="text" id="wp-a" placeholder="+Атака / Шкода" class="text-xs w-full">
                    <textarea id="wp-d" placeholder="Властивості..." class="text-xs h-12 w-full"></textarea>
                    <button onclick="window.addWeapon()" class="btn-gold text-xs w-full">Додати</button>
                </div>
            </div>

            <div class="glass-card p-6 border-t-purple-900">
                <h3 class="text-xs font-bold mb-4 uppercase">Книга заклинань</h3>
                <div id="spell-list" class="space-y-2 mb-4 max-h-[300px] overflow-y-auto pr-1"></div>
                <div class="space-y-2 bg-black/20 p-3 rounded">
                    <div class="flex gap-2">
                        <input type="text" id="sp-n" placeholder="Назва" class="text-xs w-full">
                        <select id="sp-l" class="text-xs w-32">
                            <option value="0">Змова</option>
                            <option value="1">1 Рівень</option>
                            <option value="2">2 Рівень</option>
                            <option value="3">3 Рівень</option>
                            <option value="4">4 Рівень</option>
                            <option value="5">5 Рівень</option>
                        </select>
                    </div>
                    <textarea id="sp-d" placeholder="Ефект..." class="text-xs h-12 w-full"></textarea>
                    <button onclick="window.addSpell()" class="btn-gold text-xs w-full" style="background: #6b21a8; color: white;">Вивчити</button>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="glass-card p-6 bg-gradient-to-br from-[#1a1a1f] to-[#111] border-t-yellow-600">
                <h3 class="text-xs font-bold uppercase mb-4 text-center tracking-widest">Гаманець</h3>
                <div class="grid grid-cols-3 gap-2">
                    <div class="text-center">
                        <p class="text-[8px] text-gold uppercase mb-1 font-bold">Золото</p>
                        <input type="number" id="gp" oninput="window.updWallet('gp')" class="w-full text-center text-sm font-bold bg-transparent border-none p-0">
                    </div>
                    <div class="text-center">
                        <p class="text-[8px] text-gray-400 uppercase mb-1 font-bold">Срібло</p>
                        <input type="number" id="sp" oninput="window.updWallet('sp')" class="w-full text-center text-sm font-bold bg-transparent border-none p-0">
                    </div>
                    <div class="text-center">
                        <p class="text-[8px] text-orange-700 uppercase mb-1 font-bold">Мідь</p>
                        <input type="number" id="cp" oninput="window.updWallet('cp')" class="w-full text-center text-sm font-bold bg-transparent border-none p-0">
                    </div>
                </div>
            </div>

            <div class="glass-card p-6">
                <h3 class="text-xs font-bold uppercase mb-4">Інвентар</h3>
                <div id="inv-list" class="space-y-2 mb-4"></div>
                <div class="space-y-2">
                    <input type="text" id="it-n" placeholder="Предмет" class="text-xs w-full">
                    <textarea id="it-d" placeholder="Опис..." class="text-xs h-12 w-full"></textarea>
                    <button onclick="window.addItem()" class="bg-gray-800 text-gray-300 w-full py-2 rounded text-xs">Додати</button>
                </div>
            </div>

            <div class="glass-card p-6 min-h-[300px] flex flex-col border-t-blue-900">
                <h3 class="text-xs font-bold uppercase mb-4 flex justify-between">Блокнот</h3>
                <textarea id="notes" oninput="window.upd('notes')" class="flex-1 bg-black/30 p-3 rounded text-sm text-gray-400 italic resize-none border border-white/5 outline-none" placeholder="Нотатки..."></textarea>
            </div>
        </div>
    </main>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1R-GhTA8rsQvvO-zGWdI0UAvsqHiUJcU",
        authDomain: "dnddatabase-27d3c.firebaseapp.com",
        projectId: "dnddatabase-27d3c",
        storageBucket: "dnddatabase-27d3c.firebasestorage.app",
        messagingSenderId: "200380949962",
        appId: "1:200380949962:web:660ba4eff3d96027099b33"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const skillNames = ["Атлетика (СИЛ)", "Акробатика (СПР)", "Скритність (СПР)", "Ловкість рук (СПР)", "Аналіз (ІНТ)", "Історія (ІНТ)", "Магія (ІНТ)", "Природа (ІНТ)", "Релігія (ІНТ)", "Уважність (МУД)", "Виживання (МУД)", "Медицина (МУД)", "Прозорливість (МУД)", "Тварини (МУД)", "Виступ (ХАР)", "Залякування (ХАР)", "Обман (ХАР)", "Переконання (ХАР)"];
    const slotCounts = [4, 3, 3, 3, 3, 2, 2, 1, 1];
    
    const template = { 
        name: "Новий Герой", race: "", class: "", prof: 2, 
        stats: { "СИЛ": 10, "СПР": 10, "ТІЛ": 10, "ІНТ": 10, "МУД": 10, "ХАР": 10 }, 
        ac: 10, init: 0, spd: "30 фт", curHP: 10, maxHP: 10, 
        weapons: [], spells: [], inventory: [], notes: "", 
        slots: [0,0,0,0,0,0,0,0,0],
        wallet: { gp: 0, sp: 0, cp: 0 }
    };

    let chars = JSON.parse(localStorage.getItem('dnd_v1_2026')) || [{...template}];
    let idx = parseInt(localStorage.getItem('dnd_idx_2026')) || 0;

    const save = () => { localStorage.setItem('dnd_v1_2026', JSON.stringify(chars)); localStorage.setItem('dnd_idx_2026', idx); };

    // --- ФУНКЦІЇ ВІДОБРАЖЕННЯ (RENDER) ---

    // Оголошуємо через window, щоб уникнути помилок redeclare та мати доступ з HTML
    window.renderHP = () => {
        const c = chars[idx];
        const hpBar = document.getElementById('hp-bar');
        const curHPText = document.getElementById('cur-hp');
        if (!hpBar || !curHPText) return;

        const max = c.maxHP || 1;
        const percent = (c.curHP / max) * 100;
        
        hpBar.style.width = Math.min(100, Math.max(0, percent)) + '%';
        curHPText.innerText = c.curHP;

        // Зміна кольору полоски
        if (percent < 25) hpBar.style.backgroundColor = "#ef4444";
        else if (percent < 50) hpBar.style.backgroundColor = "#f59e0b";
        else hpBar.style.backgroundColor = "#16a34a";
    };

    const renderStats = () => {
        document.getElementById('stats').innerHTML = Object.entries(chars[idx].stats).map(([k, v]) => {
            const mod = Math.floor((v - 10) / 2);
            return `<div class="stat-box"><p class="text-[9px] text-gray-500 uppercase font-bold">${k}</p><input type="number" value="${v}" oninput="window.updStat('${k}', this.value)" class="w-full text-center text-xl font-bold bg-transparent border-none p-0 outline-none"><p class="text-xs text-gold">${mod >= 0 ? '+' : ''}${mod}</p></div>`;
        }).join('');
    };

    const renderSkills = () => {
        document.getElementById('skills').innerHTML = skillNames.map(s => {
            const key = s.match(/\((.*?)\)/)[1];
            const mod = Math.floor((chars[idx].stats[key]-10)/2);
            return `<div class="flex justify-between border-b border-white/5 py-1"><span>${s}</span><span class="text-gold font-bold">${mod >= 0 ? '+' : ''}${mod}</span></div>`;
        }).join('');
    };

    const renderSlots = () => {
        document.getElementById('slots').innerHTML = slotCounts.map((m, l) => `
            <div class="flex justify-between items-center bg-black/20 p-2 rounded">
                <span class="text-[10px] text-gray-500 uppercase">Рівень ${l+1}</span>
                <div class="flex gap-1.5">${Array.from({length: m}, (_, i) => `<div onclick="window.tglSlot(${l}, ${i})" class="slot-circle ${i < chars[idx].slots[l] ? 'filled' : ''}"></div>`).join('')}</div>
            </div>`).join('');
    };

    const renderWeapons = () => {
        document.getElementById('weapon-list').innerHTML = chars[idx].weapons.map((w, i) => `
            <div class="bg-black/40 p-2 rounded border border-white/5">
                <div class="flex justify-between">
                    <div class="cursor-pointer" onclick="this.parentElement.nextElementSibling.classList.toggle('show')">
                        <span class="text-xs font-bold text-red-500">${w.a} <span class="text-gray-200 ml-2 font-normal">${w.n}</span></span>
                    </div>
                    <i class="fa-solid fa-xmark del-btn text-xs" onclick="window.delItem('wp', ${i})"></i>
                </div><div class="hidden-content item-desc">${w.d || 'Опис відсутній'}</div>
            </div>`).join('');
    };

    const renderSpells = () => {
        const sorted = [...chars[idx].spells].sort((a,b)=>a.l-b.l);
        document.getElementById('spell-list').innerHTML = sorted.map((s, i) => `
            <div class="bg-black/40 p-2 rounded border border-white/5">
                <div class="flex justify-between">
                    <div class="cursor-pointer" onclick="this.parentElement.nextElementSibling.classList.toggle('show')">
                        <span class="text-[10px] text-purple-400 font-bold">${s.l==0?'Змова':'Рівень '+s.l} <span class="text-gray-200 ml-1 font-normal text-xs">${s.n}</span></span>
                    </div>
                    <i class="fa-solid fa-xmark del-btn text-xs" onclick="window.delItem('sp', ${chars[idx].spells.indexOf(s)})"></i>
                </div><div class="hidden-content item-desc">${s.d || 'Ефект не описано'}</div>
            </div>`).join('');
    };

    const renderInv = () => {
        document.getElementById('inv-list').innerHTML = chars[idx].inventory.map((it, i) => `
            <div class="bg-black/40 p-2 rounded border border-white/5">
                <div class="flex justify-between">
                    <div class="cursor-pointer text-xs text-gold/80" onclick="this.parentElement.nextElementSibling.classList.toggle('show')">${it.n}</div>
                    <i class="fa-solid fa-xmark del-btn text-xs" onclick="window.delItem('it', ${i})"></i>
                </div>
                <div class="hidden-content item-desc">${it.d || 'Без опису'}</div>
            </div>`).join('');
    };

    const renderSelector = () => { document.getElementById('char-select').innerHTML = chars.map((c, i) => `<option value="${i}" ${i==idx?'selected':''}>${c.name}</option>`).join(''); };

    // --- ФУНКЦІЇ ОНОВЛЕННЯ (UPDATES) ---

    window.upd = (field) => {
        const c = chars[idx];
        const val = document.getElementById(field).value;

        if (field === 'name') {
            c.name = val;
            renderSelector();
        } else if (field === 'max-hp') {
            c.maxHP = parseInt(val) || 1;
            if (c.curHP > c.maxHP) c.curHP = c.maxHP;
            window.renderHP();
        } else if (field === 'prof' || field === 'ac' || field === 'init') {
            c[field] = parseInt(val) || 0;
        } else if (field === 'race' || field === 'class' || field === 'spd' || field === 'notes') {
            c[field] = val;
        }
        save();
    };

    window.updStat = (k, v) => { chars[idx].stats[k] = parseInt(v) || 0; renderStats(); renderSkills(); save(); };
    window.updWallet = (curr) => { chars[idx].wallet[curr] = parseInt(document.getElementById(curr).value) || 0; save(); };

    window.modHP = (m) => {
        const val = parseInt(document.getElementById('hp-amt').value) || 0;
        chars[idx].curHP = m > 0 ? Math.min(chars[idx].maxHP, chars[idx].curHP + val) : Math.max(0, chars[idx].curHP - val);
        document.getElementById('hp-amt').value = ''; 
        window.renderHP(); 
        save();
    };

    window.tglSlot = (l, i) => { chars[idx].slots[l] = (chars[idx].slots[l] === i + 1) ? i : i + 1; renderSlots(); save(); };

    // --- КЕРУВАННЯ ГЕРОЯМИ ТА СПИСКАМИ ---

    window.switchChar = () => { idx = parseInt(document.getElementById('char-select').value); renderAll(); save(); };
    window.newChar = () => { chars.push(JSON.parse(JSON.stringify(template))); idx = chars.length - 1; renderAll(); save(); };
    window.deleteChar = () => { if(chars.length > 1 && confirm("Видалити героя?")) { chars.splice(idx, 1); idx = 0; renderAll(); save(); } };
    
    window.delItem = (type, i) => {
        if (type === 'wp') chars[idx].weapons.splice(i, 1);
        if (type === 'sp') chars[idx].spells.splice(i, 1);
        if (type === 'it') chars[idx].inventory.splice(i, 1);
        save();
        if (type === 'wp') renderWeapons();
        if (type === 'sp') renderSpells();
        if (type === 'it') renderInv();
    };

    window.addWeapon = () => {
        const n = document.getElementById('wp-n').value, a = document.getElementById('wp-a').value, d = document.getElementById('wp-d').value;
        if(n) { chars[idx].weapons.push({n, a, d}); renderWeapons(); save(); 
        document.getElementById('wp-n').value=''; document.getElementById('wp-a').value=''; document.getElementById('wp-d').value=''; }
    };

    window.addSpell = () => {
        const n = document.getElementById('sp-n').value, l = document.getElementById('sp-l').value, d = document.getElementById('sp-d').value;
        if(n) { chars[idx].spells.push({n, l: parseInt(l), d}); renderSpells(); save(); 
        document.getElementById('sp-n').value=''; document.getElementById('sp-d').value=''; }
    };

    window.addItem = () => {
        const n = document.getElementById('it-n').value, d = document.getElementById('it-d').value;
        if(n) { chars[idx].inventory.push({n, d}); renderInv(); save(); 
        document.getElementById('it-n').value=''; document.getElementById('it-d').value=''; }
    };

    window.longRest = () => { 
        chars[idx].curHP = chars[idx].maxHP; 
        chars[idx].slots = [0,0,0,0,0,0,0,0,0]; 
        window.renderHP(); 
        renderSlots(); 
        save(); 
        alert("Відпочинок завершено!"); 
    };

    const renderAll = () => {
        const c = chars[idx];
        document.getElementById('name').value = c.name;
        document.getElementById('race').value = c.race || "";
        document.getElementById('class').value = c.class || "";
        document.getElementById('prof').value = c.prof;
        document.getElementById('ac').value = c.ac;
        document.getElementById('init').value = c.init;
        document.getElementById('spd').value = c.spd;
        document.getElementById('max-hp').value = c.maxHP;
        document.getElementById('notes').value = c.notes || "";
        
        if(!c.wallet) c.wallet = {gp:0, sp:0, cp:0};
        document.getElementById('gp').value = c.wallet.gp;
        document.getElementById('sp').value = c.wallet.sp;
        document.getElementById('cp').value = c.wallet.cp;

        renderStats(); renderSkills(); window.renderHP(); renderSlots(); renderWeapons(); renderSpells(); renderInv(); renderSelector();
    };

    // --- ХМАРНА СИНХРОНІЗАЦІЯ ---

    window.syncToCloud = async () => {
        const id = document.getElementById('sync-id').value;
        if(!id) return alert("Вкажи Cloud ID!");
        try { await setDoc(doc(db, "characters", id), chars[idx]); alert("Збережено в хмарі!"); } 
        catch(e) { console.error(e); alert("Помилка синхронізації."); }
    };

    window.syncFromCloud = async () => {
        const id = document.getElementById('sync-id').value;
        if(!id) return alert("Вкажи Cloud ID!");
        try {
            const docSnap = await getDoc(doc(db, "characters", id));
            if (docSnap.exists()) { chars[idx] = docSnap.data(); renderAll(); save(); alert("Героя завантажено!"); } 
            else { alert("ID не знайдено."); }
        } catch(e) { alert("Помилка завантаження."); }
    };

    // Запуск першого рендеру
    renderAll();
</script>
</body>
</html>
